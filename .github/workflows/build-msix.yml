name: Build MSIX Package

on:
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'assets/**'
      - 'LICENSE'
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  PROJECT_FILE: src/Desktop/BiliCopilot.UI/BiliCopilot.UI.csproj
  SOLUTION_FILE: src/Bili.Copilot.sln
  CONFIGURATION: Release
  RUNTIME: win-x64

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Bili.Copilot 使用 .NET 9 (Windows App SDK 1.5+)
      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      # 完全绕过项目自带的 nuget.config，用临时文件指定只走 nuget.org 公共源。
      # 原始 nuget.config 含多个 Azure DevOps 私有源，在 CI 中全部不可用。
      - name: Create CI-safe NuGet config (temp file)
        run: |
          $ciNugetConfig = Join-Path $env:RUNNER_TEMP "ci.nuget.config"
          @'
          <?xml version="1.0" encoding="utf-8"?>
          <configuration>
            <packageSources>
              <clear />
              <add key="nuget.org" value="https://api.nuget.org/v3/index.json" />
            </packageSources>
          </configuration>
          '@ | Out-File -FilePath $ciNugetConfig -Encoding utf8
          Write-Host "##[set-env name=CI_NUGET_CONFIG]$ciNugetConfig"
          echo "CI_NUGET_CONFIG=$ciNugetConfig" >> $env:GITHUB_ENV
          Write-Host "✅ Created CI NuGet config at: $ciNugetConfig"

      # 使用临时配置 restore，同时捕获详细日志用于排查
      - name: Restore dependencies
        run: |
          dotnet restore "$env:SOLUTION_FILE" `
            --configuration $env:CONFIGURATION `
            --configfile "$env:CI_NUGET_CONFIG" `
            --verbosity detailed 2>&1 | Tee-Object -Variable restoreLog
          Write-Host "=== RESTORE LOG (last 50 lines) ==="
          $restoreLog | Select-Object -Last 50

      # CI 环境下放宽 warning 策略
      - name: Build solution
        run: |
          dotnet build "$env:PROJECT_FILE" `
            -c $env:CONFIGURATION `
            -r $env:RUNTIME `
            /p:PublishAot=False `
            /p:EnableMsixTooling=true `
            /p:TreatWarningsAsErrors=false `
            /p:EnforceCodeStyleInBuild=false `
            --no-restore

      - name: Publish MSIX package
        run: |
          dotnet publish "$env:PROJECT_FILE" `
            -c $env:CONFIGURATION `
            -r $env:RUNTIME `
            /p:PublishAot=False `
            /p:EnableMsixTooling=true `
            /p:TreatWarningsAsErrors=false `
            /p:AppxPackageBuildingBlock=Store `
            /p:AppxBundlePlatforms=x64 `
            /p:AppxBundle=Always `
            --self-contained `
            -o ./publish_output

      - name: Upload MSIX artifacts
        uses: actions/upload-artifact@v4
        with:
          name: MSIX-Package-win-x64-Release
          path: |
            publish_output/**/*.msix
            publish_output/**/*.msixbundle
            publish_output/**/*.appxupload
          retention-days: 30
          if-no-files-found: warn

      - name: Show output structure
        if: always()
        run: tree /f publish_output || dir /s /b publish_output
