name: Build MSIX Package

on:
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'assets/**'
      - 'LICENSE'
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  PROJECT_FILE: src/Desktop/BiliCopilot.UI/BiliCopilot.UI.csproj
  SOLUTION_FILE: src/Bili.Copilot.sln
  CONFIGURATION: Release
  RUNTIME: win-x64

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Check .NET and tooling info
        shell: bash
        run: |
          echo "=== .NET SDK Version ==="
          dotnet --version
          echo "=== .NET SDKs installed ==="
          dotnet --list-sdks
          echo "=== .NET Runtimes ==="
          dotnet --list-runtimes
          echo "=== Working directory ==="
          pwd
          echo "=== LS root ==="
          ls -la

      # Restore dependencies
      # Note: sergio private source has been removed from nuget.config;
      # all packages (including ComputeSharp, Richasy.*) are available on nuget.org
      - name: Restore dependencies
        shell: bash
        run: |
          dotnet restore "$SOLUTION_FILE" --configuration "$CONFIGURATION" --verbosity normal 2>&1 | tee restore_output.txt
          echo "=== EXIT CODE: $? ==="
        env:
          DOTNET_SKIP_FIRST_TIME_EXPERIENCE: true
          DOTNET_CLI_TELEMETRY_OPTOUT: true

      - name: Upload restore output log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: restore-detailed-log
          path: restore_output.txt
          retention-days: 7
          if-no-files-found: warn

      - name: Build solution
        shell: bash
        run: dotnet build "$PROJECT_FILE" -c "$CONFIGURATION" -r "$RUNTIME" /p:PublishAot=False /p:EnableMsixTooling=true /p:TreatWarningsAsErrors=false /p:EnforceCodeStyleInBuild=false --no-restore

      - name: Publish MSIX package
        shell: bash
        run: dotnet publish "$PROJECT_FILE" -c "$CONFIGURATION" -r "$RUNTIME" /p:PublishAot=False /p:EnableMsixTooling=true /p:TreatWarningsAsErrors=false /p:AppxPackageBuildingBlock=Store /p:AppxBundlePlatforms=x64 /p:AppxBundle=Always --self-contained -o ./publish_output

      - name: Upload MSIX artifacts
        uses: actions/upload-artifact@v4
        with:
          name: MSIX-Package-win-x64-Release
          path: |
            publish_output/**/*.msix
            publish_output/**/*.msixbundle
            publish_output/**/*.appxupload
          retention-days: 30
          if-no-files-found: warn

      - name: Show output structure
        if: always()
        shell: bash
        run: find publish_output -type f 2>/dev/null || echo "No output directory"
