name: Build MSIX Package

on:
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'assets/**'
      - 'LICENSE'
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  PROJECT_FILE: src/Desktop/BiliCopilot.UI/BiliCopilot.UI.csproj
  SOLUTION_FILE: src/Bili.Copilot.sln
  CONFIGURATION: Release
  RUNTIME: win-x64

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Bili.Copilot 使用 .NET 9 (Windows App SDK 1.5+)
      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      # ============================================================
      # 关键修复：CI 环境完全替换 nuget.config
      #
      # 原始 nuget.config 包含多个 Azure DevOps 私有/半私有源：
      #   - sergio   → 需要认证 (v2 feed, 无 token 必挂)
      #   - labs.windows / community → Azure DevOps，CI 可能无法解析或超时
      #   - dotnet9  → Azure DevOps dotnet9 preview feed
      #
      # 这些源在 CI 中全部不可靠。直接替换为只保留 nuget.org 公共源，
      # 所有依赖包（包括 Richasy.* 系列）都能从 nuget.org 获取。
      # ============================================================
      - name: Replace nuget.config with CI-safe version (public nuget.org only)
        run: |
          $ciConfig = @'
          <?xml version="1.0" encoding="utf-8"?>
          <configuration>
            <packageSources>
              <clear />
              <add key="nuget.org" value="https://api.nuget.org/v3/index.json" />
            </packageSources>
            <disabledPackageSources>
              <clear />
            </disabledPackageSources>
          </configuration>
          '@
          Set-Content nuget.config -Value $ciConfig -Encoding UTF8
          Write-Host "✅ Replaced nuget.config with public-only sources"

      - name: Restore dependencies
        run: dotnet restore "$env:SOLUTION_FILE" `
          --configuration $env:CONFIGURATION

      # CI 环境下放宽 warning 策略：
      # TreatWarningsAsErrors=false — 避免 CI 特有的 warning 导致 build fail
      # EnforceCodeStyleInBuild=false — CI 编译器版本/环境差异可能触发额外 style warning
      - name: Build solution
        run: |
          dotnet build "$env:PROJECT_FILE" `
            -c $env:CONFIGURATION `
            -r $env:RUNTIME `
            /p:PublishAot=False `
            /p:EnableMsixTooling=true `
            /p:TreatWarningsAsErrors=false `
            /p:EnforceCodeStyleInBuild=false `
            --no-restore

      - name: Publish MSIX package
        run: |
          dotnet publish "$env:PROJECT_FILE" `
            -c $env:CONFIGURATION `
            -r $env:RUNTIME `
            /p:PublishAot=False `
            /p:EnableMsixTooling=true `
            /p:TreatWarningsAsErrors=false `
            /p:AppxPackageBuildingBlock=Store `
            /p:AppxBundlePlatforms=x64 `
            /p:AppxBundle=Always `
            --self-contained `
            -o ./publish_output

      - name: Upload MSIX artifacts
        uses: actions/upload-artifact@v4
        with:
          name: MSIX-Package-win-x64-Release
          path: |
            publish_output/**/*.msix
            publish_output/**/*.msixbundle
            publish_output/**/*.appxupload
          retention-days: 30
          if-no-files-found: warn

      - name: Show output structure
        if: always()
        run: tree /f publish_output || dir /s /b publish_output
