name: Build MSIX Package

on:
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'assets/**'
      - 'LICENSE'
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  PROJECT_FILE: src/Desktop/BiliCopilot.UI/BiliCopilot.UI.csproj
  SOLUTION_FILE: src/Bili.Copilot.sln
  CONFIGURATION: Release
  RUNTIME: win-x64

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      # 用临时 nuget.config 替代项目自带的（含多个不可用的 Azure DevOps 源）
      - name: Create CI-safe NuGet config
        shell: pwsh
        run: |
          $ciConfigPath = Join-Path "$env:RUNNER_TEMP" "ci.nuget.config"
          $nugetContent = @"<?xml version="1.0" encoding="utf-8"?>
          <configuration>
            <packageSources>
              <clear />
              <add key="nuget.org" value="https://api.nuget.org/v3/index.json" />
            </packageSources>
          </configuration>"@
          Set-Content -Path $ciConfigPath -Value $nugetContent -Encoding UTF8
          "CI_NUGET_CONFIG=$ciConfigPath" >> $env:GITHUB_ENV
          Write-Host "Created CI NuGet config at: $ciConfigPath"

      - name: Restore dependencies
        run: dotnet restore "$env:SOLUTION_FILE" --configuration $env:CONFIGURATION --configfile "$env:CI_NUGET_CONFIG"

      - name: Build solution
        run: dotnet build "$env:PROJECT_FILE" -c $env:CONFIGURATION -r $env:RUNTIME /p:PublishAot=False /p:EnableMsixTooling=true /p:TreatWarningsAsErrors=false /p:EnforceCodeStyleInBuild=false --no-restore

      - name: Publish MSIX package
        run: dotnet publish "$env:PROJECT_FILE" -c $env:CONFIGURATION -r $env:RUNTIME /p:PublishAot=False /p:EnableMsixTooling=true /p:TreatWarningsAsErrors=false /p:AppxPackageBuildingBlock=Store /p:AppxBundlePlatforms=x64 /p:AppxBundle=Always --self-contained -o ./publish_output

      - name: Upload MSIX artifacts
        uses: actions/upload-artifact@v4
        with:
          name: MSIX-Package-win-x64-Release
          path: |
            publish_output/**/*.msix
            publish_output/**/*.msixbundle
            publish_output/**/*.appxupload
          retention-days: 30
          if-no-files-found: warn

      - name: Show output structure
        if: always()
        run: tree /f publish_output || dir /s /b publish_output
