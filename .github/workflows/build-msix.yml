name: Build MSIX Package

on:
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'assets/**'
      - 'LICENSE'
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  PROJECT_FILE: src/Desktop/BiliCopilot.UI/BiliCopilot.UI.csproj
  SOLUTION_FILE: src/Bili.Copilot.sln
  CONFIGURATION: Release
  RUNTIME: win-x64

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      # 用最简单的方式重写 nuget.config（cmd echo）
      - name: Override NuGet config for CI
        run: |
          (echo ^<?xml version="1.0" encoding="utf-8"?^>) > nuget.config
          (echo ^<configuration^>) >> nuget.config
          (echo   ^<packageSources^>) >> nuget.config
          (echo     ^<clear /^>) >> nuget.config
          (echo     ^<add key="nuget.org" value="https://api.nuget.org/v3/index.json" /^>) >> nuget.config
          (echo   ^</packageSources^>) >> nuget.config
          (echo ^</configuration^>) >> nuget.config

      # 第一次 restore：捕获完整日志用于诊断（忽略源失败）
      - name: Restore dependencies (with logging)
        run: |
          dotnet restore "%SOLUTION_FILE%" --configuration %CONFIGURATION% --ignore-failed-sources > restore_log.txt 2>&1 || true
          type restore_log.txt

      - name: Upload restore log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: restore-log
          path: restore_log.txt
          retention-days: 7
          if-no-files-found: warn

      # 第二次 restore：正式执行，仍然忽略源失败
      - name: Restore dependencies
        run: dotnet restore "%SOLUTION_FILE%" --configuration %CONFIGURATION% --ignore-failed-sources

      - name: Build solution
        run: dotnet build "%PROJECT_FILE%" -c %CONFIGURATION% -r %RUNTIME% /p:PublishAot=False /p:EnableMsixTooling=true /p:TreatWarningsAsErrors=false /p:EnforceCodeStyleInBuild=false --no-restore

      - name: Publish MSIX package
        run: dotnet publish "%PROJECT_FILE%" -c %CONFIGURATION% -r %RUNTIME% /p:PublishAot=False /p:EnableMsixTooling=true /p:TreatWarningsAsErrors=false /p:AppxPackageBuildingBlock=Store /p:AppxBundlePlatforms=x64 /p:AppxBundle=Always --self-contained -o ./publish_output

      - name: Upload MSIX artifacts
        uses: actions/upload-artifact@v4
        with:
          name: MSIX-Package-win-x64-Release
          path: |
            publish_output/**/*.msix
            publish_output/**/*.msixbundle
            publish_output/**/*.appxupload
          retention-days: 30
          if-no-files-found: warn

      - name: Show output structure
        if: always()
        run: tree /f publish_output || dir /s /b publish_output
