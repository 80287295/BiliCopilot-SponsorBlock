name: Build MSIX Package

on:
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'assets/**'
      - 'LICENSE'
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  PROJECT_FILE: src/Desktop/BiliCopilot.UI/BiliCopilot.UI.csproj
  SOLUTION_FILE: src/Bili.Copilot.sln
  CONFIGURATION: Release
  RUNTIME: win-x64

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      # 用 PowerShell 写一个干净的 CI 专用 nuget.config（只保留 nuget.org 公共源）
      # 原始 nuget.config 包含 Azure DevOps 私有源，CI 环境没有访问凭证
      - name: Write clean NuGet config for CI
        shell: pwsh
        run: |
          $nugetConfig = @'
          <?xml version="1.0" encoding="utf-8"?>
          <configuration>
            <packageSources>
              <clear />
              <add key="nuget.org" value="https://api.nuget.org/v3/index.json" />
            </packageSources>
          </configuration>
          '@
          # 备份原始配置（调试用）
          if (Test-Path nuget.config) { Copy-Item nuget.config nuget.config.orig }
          Set-Content -Path nuget.config -Value $nugetConfig -Encoding UTF8
          Write-Host "=== Written nuget.config ==="
          Get-Content nuget.config

      # Restore dependencies
      - name: Restore dependencies
        run: |
          dotnet restore "%SOLUTION_FILE%" --configfile nuget.config --configuration %CONFIGURATION% --ignore-failed-sources --verbosity normal
        env:
          DOTNET_SKIP_FIRST_TIME_EXPERIENCE: true
          DOTNET_CLI_TELEMETRY_OPTOUT: true

      - name: Build solution
        run: dotnet build "%PROJECT_FILE%" -c %CONFIGURATION% -r %RUNTIME% /p:PublishAot=False /p:EnableMsixTooling=true /p:TreatWarningsAsErrors=false /p:EnforceCodeStyleInBuild=false --no-restore

      - name: Publish MSIX package
        run: dotnet publish "%PROJECT_FILE%" -c %CONFIGURATION% -r %RUNTIME% /p:PublishAot=False /p:EnableMsixTooling=true /p:TreatWarningsAsErrors=false /p:AppxPackageBuildingBlock=Store /p:AppxBundlePlatforms=x64 /p:AppxBundle=Always --self-contained -o ./publish_output

      - name: Upload MSIX artifacts
        uses: actions/upload-artifact@v4
        with:
          name: MSIX-Package-win-x64-Release
          path: |
            publish_output/**/*.msix
            publish_output/**/*.msixbundle
            publish_output/**/*.appxupload
          retention-days: 30
          if-no-files-found: warn

      - name: Show output structure
        if: always()
        run: tree /f publish_output || dir /s /b publish_output
